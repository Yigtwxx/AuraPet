<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0F1514" />
    <title>Çevrimdışı — AuraPet</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      html, body { height: 100%; margin: 0; }
      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 24px;
        padding: max(24px, env(safe-area-inset-top)) 24px max(24px, env(safe-area-inset-bottom));
        background:
          radial-gradient(ellipse 70% 50% at 50% 28%, rgba(38, 166, 160, 0.10), transparent 70%),
          #0F1514;
        color: #edf2f0;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        text-align: center;
        -webkit-font-smoothing: antialiased;
      }
      .badge {
        width: 96px;
        height: 96px;
        border-radius: 28px;
        background: #26a6a0;
        box-shadow: 0 12px 32px -12px rgba(0, 0, 0, 0.5);
        display: flex;
        align-items: center;
        justify-content: center;
      }
      h1 { font-size: 22px; font-weight: 700; margin: 0; letter-spacing: -0.02em; }
      p { margin: 0; max-width: 30ch; color: #b9c4c0; line-height: 1.55; font-size: 15px; }
      button {
        margin-top: 8px;
        padding: 12px 24px;
        font-size: 15px;
        font-weight: 600;
        color: #fff;
        background: #1e8c87;
        border: none;
        border-radius: 9999px;
        cursor: pointer;
        box-shadow: 0 8px 24px -12px rgba(0, 0, 0, 0.5);
        transition: transform 0.16s ease, box-shadow 0.16s ease;
      }
      button:active { transform: scale(0.97); }
    </style>
  </head>
  <body>
    <div class="badge" aria-hidden="true">
      <svg width="56" height="56" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="100" cy="44" rx="30" ry="8" fill="none" stroke="#fff" stroke-width="3" stroke-opacity="0.6" />
        <ellipse cx="80" cy="70" rx="12" ry="16" fill="#fff" />
        <ellipse cx="120" cy="70" rx="12" ry="16" fill="#fff" />
        <ellipse cx="100" cy="120" rx="46" ry="45" fill="#fff" />
        <ellipse cx="84" cy="124" rx="7" ry="8.5" fill="#1a1d24" />
        <ellipse cx="116" cy="124" rx="7" ry="8.5" fill="#1a1d24" />
        <ellipse cx="68" cy="138" rx="7" ry="5" fill="#ff8fa3" fill-opacity="0.55" />
        <ellipse cx="132" cy="138" rx="7" ry="5" fill="#ff8fa3" fill-opacity="0.55" />
        <path d="M91,142 Q100,151 109,142" fill="none" stroke="#1a1d24" stroke-width="2.6" stroke-linecap="round" />
      </svg>
    </div>
    <h1>İnternet bağlantısı yok</h1>
    <p>Aurion seni bekliyor. Bağlantın geri geldiğinde kaldığın yerden devam edebilirsin.</p>
    <button onclick="location.reload()">Tekrar dene</button>
  </body>
</html>
