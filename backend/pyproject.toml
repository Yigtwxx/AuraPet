[tool.ruff]
target-version = "py39"
line-length = 100
exclude = [".venv", "__pycache__", "*.egg-info"]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "UP",  # pyupgrade
    "N",   # pep8-naming
    "RUF", # ruff-specific rules
]
ignore = [
    "E501",    # line too long (handled by formatter)
    "B008",    # function calls in defaults (FastAPI pattern)
    "N803",    # argument name should be lowercase (GraphQL resolver args)
    "N806",    # variable in function should be lowercase
    "RUF001",  # ambiguous unicode chars (strings) — intentional Turkish
    "RUF002",  # ambiguous unicode chars (docstrings) — intentional Turkish
    "RUF003",  # ambiguous unicode chars (comments) — intentional Turkish
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["S101"]  # allow assert in tests

[tool.ruff.lint.isort]
known-first-party = ["app"]

[tool.mypy]
python_version = "3.9"
strict = false
ignore_missing_imports = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
warn_unused_ignores = true
warn_redundant_casts = true
warn_return_any = false
no_implicit_optional = true
exclude = [".venv/", "tests/"]

[tool.black]
line-length = 100
target-version = ["py39"]
exclude = ".venv"

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
python_files = ["test_*.py"]
python_functions = ["test_*"]
