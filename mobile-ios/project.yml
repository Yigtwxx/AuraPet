name: AuraPet
options:
  bundleIdPrefix: com.aurapet
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    CODE_SIGNING_ALLOWED: NO
  configs:
    Debug:
      AURAPET_GRAPHQL_URL: "http://localhost:8000/graphql"
    Release:
      AURAPET_GRAPHQL_URL: "http://localhost:8000/graphql"
packages:
  Lottie:
    url: https://github.com/airbnb/lottie-spm.git
    from: "4.5.0"
targets:
  AuraPet:
    type: application
    platform: iOS
    sources:
      - path: AuraPet
        excludes:
          - "README.md"
          - "Resources/Lottie/**"
      - path: AuraPet/Resources/Lottie
        type: folder
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.aurapet.AuraPet
        INFOPLIST_FILE: AuraPet/Info.plist
        ENABLE_PREVIEWS: YES
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    dependencies:
      - package: Lottie
        product: Lottie
    scheme:
      testTargets:
        - AuraPetTests
  AuraPetTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: AuraPetTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.aurapet.AuraPetTests
    dependencies:
      - target: AuraPet
